services:
  - type: web
    name: moodstream-api
    runtime: node
    plan: free
    buildCommand: "cd api && npm install"
    startCommand: "cd api && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        value: "https://suhani00796.github.io/MoodStream"
